# ───────────────────────────────────────────────────────────────
# Autonomous Analytics Agents — Cloud Build CI/CD Pipeline
# ───────────────────────────────────────────────────────────────
#
# Triggered on push to main branch.
# Builds Docker image → pushes to Artifact Registry → deploys to Cloud Run.
#
# Required GCP setup (one-time):
#   gcloud services enable cloudbuild.googleapis.com run.googleapis.com artifactregistry.googleapis.com secretmanager.googleapis.com
#   gcloud artifacts repositories create analytics-agents --repository-format=docker --location=us-central1
#   gcloud builds triggers create github --repo=... --branch=main --build-config=cloudbuild.yaml
# ───────────────────────────────────────────────────────────────

steps:
  # 1. Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/analytics-agents/analytics-agents:$COMMIT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/analytics-agents/analytics-agents:latest"
      - "."

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/analytics-agents/analytics-agents:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-latest"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/analytics-agents/analytics-agents:latest"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "analytics-agents"
      - "--image=us-central1-docker.pkg.dev/$PROJECT_ID/analytics-agents/analytics-agents:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=2Gi"
      - "--cpu=2"
      - "--timeout=900"
      - "--max-instances=3"
      - "--concurrency=10"
      - "--set-env-vars=GCP_PROJECT=$PROJECT_ID"
      - "--set-env-vars=GCS_BUCKET_NAME=${_GCS_BUCKET_NAME}"
      - "--set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest"
      - "--set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest"
      - "--set-secrets=GROQ_API_KEY=GROQ_API_KEY:latest"
      - "--set-secrets=TOGETHER_API_KEY=TOGETHER_API_KEY:latest"
      - "--set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest"
      - "--set-secrets=FIRECRAWL_API_KEY=FIRECRAWL_API_KEY:latest"

# ── Substitution variables (set in Cloud Build trigger or via CLI) ──
substitutions:
  _GCS_BUCKET_NAME: "analytics-agents-storage"

# ── Artifacts to store ──────────────────────────────────────────
images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/analytics-agents/analytics-agents:$COMMIT_SHA"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/analytics-agents/analytics-agents:latest"

timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY
